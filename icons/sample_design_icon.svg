<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wand_body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D27A"/>
      <stop offset="40%"  stop-color="#D4922A"/>
      <stop offset="100%" stop-color="#8B5A0A"/>
    </linearGradient>
    <linearGradient id="wand_grip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#7B4F1A"/>
      <stop offset="100%" stop-color="#3E2408"/>
    </linearGradient>
    <radialGradient id="star_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="25%"  stop-color="#FFF9C4"/>
      <stop offset="70%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFE082" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700"  stop-opacity="0"/>
    </radialGradient>
    <filter id="soft_shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <filter id="star_glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Cabo da varinha ─────────────────────────────── -->
  <!-- Sombra do cabo -->
  <line x1="18" y1="112" x2="80" y2="50"
        stroke="#00000022" stroke-width="9"
        stroke-linecap="round"
        transform="translate(2,3)"/>
  <!-- Corpo principal do cabo -->
  <line x1="18" y1="112" x2="80" y2="50"
        stroke="url(#wand_body)" stroke-width="8"
        stroke-linecap="round"
        filter="url(#soft_shadow)"/>
  <!-- Reflexo de luz no cabo -->
  <line x1="21" y1="109" x2="77" y2="53"
        stroke="#F5E6A0" stroke-width="2"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Punho/grip escuro na base -->
  <line x1="18" y1="112" x2="30" y2="98"
        stroke="url(#wand_grip)" stroke-width="10"
        stroke-linecap="round"/>
  <!-- Anel separador -->
  <line x1="30" y1="99" x2="35" y2="93"
        stroke="#F5D27A" stroke-width="3"
        stroke-linecap="round"/>

  <!-- ── Glow externo da estrela ──────────────────────── -->
  <circle cx="88" cy="40" r="28" fill="url(#glow_outer)"/>

  <!-- ── Raios da estrela ─────────────────────────────── -->
  <!-- Raios longos (4 cardeais) -->
  <line x1="88" y1="10"  x2="88" y2="30"  stroke="#FFE566" stroke-width="4.5" stroke-linecap="round" filter="url(#star_glow)"/>
  <line x1="88" y1="50"  x2="88" y2="70"  stroke="#FFE566" stroke-width="4.5" stroke-linecap="round" filter="url(#star_glow)"/>
  <line x1="58" y1="40"  x2="78" y2="40"  stroke="#FFE566" stroke-width="4.5" stroke-linecap="round" filter="url(#star_glow)"/>
  <line x1="98" y1="40"  x2="118" y2="40" stroke="#FFE566" stroke-width="4.5" stroke-linecap="round" filter="url(#star_glow)"/>
  <!-- Raios diagonais médios -->
  <line x1="67" y1="19"  x2="79" y2="31"  stroke="#FFD030" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="97" y1="49"  x2="109" y2="61" stroke="#FFD030" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="109" y1="19" x2="97" y2="31"  stroke="#FFD030" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="79"  y1="49" x2="67" y2="61"  stroke="#FFD030" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Raios curtos intermediários (octograma) -->
  <line x1="74" y1="14"  x2="80" y2="25"  stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="102" y1="14" x2="96" y2="25"  stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="114" y1="28" x2="103" y2="34" stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="114" y1="52" x2="103" y2="46" stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="102" y1="66" x2="96" y2="55"  stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="74"  y1="66" x2="80" y2="55"  stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="62"  y1="52" x2="73" y2="46"  stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="62"  y1="28" x2="73" y2="34"  stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- ── Núcleo da estrela ────────────────────────────── -->
  <circle cx="88" cy="40" r="11" fill="url(#star_core)" filter="url(#star_glow)"/>
  <circle cx="88" cy="40" r="5"  fill="#FFFFFF" opacity="0.95"/>

  <!-- ── Faíscas flutuantes ───────────────────────────── -->
  <circle cx="42" cy="76" r="3.5" fill="#FFD700" opacity="0.75"/>
  <circle cx="52" cy="90" r="2.5" fill="#FFE566" opacity="0.60"/>
  <circle cx="32" cy="88" r="2"   fill="#FFD700" opacity="0.50"/>
  <circle cx="60" cy="82" r="1.8" fill="#FFFFFF"  opacity="0.55"/>
  <circle cx="36" cy="100" r="1.5" fill="#FFB700" opacity="0.40"/>
  <circle cx="58" cy="70" r="1.2" fill="#FFE566" opacity="0.45"/>
</svg>
